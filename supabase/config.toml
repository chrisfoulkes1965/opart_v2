# OpArt Lab Supabase local development config.
# See https://supabase.com/docs/guides/cli/config

project_id = "opart-lab"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "200MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["io.supabase.opartlab://login-callback/"]
enable_anonymous_sign_ins = true

# Stripe webhooks arrive without a Supabase JWT.
[functions.stripe-webhook]
verify_jwt = false
